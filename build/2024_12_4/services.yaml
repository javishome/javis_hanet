write_person:
  name: Log person
  description: Log person
  fields:
    payload:
      name: Payload
      description: Payload
      required: true
      selector:
        text:

push_to_qcd:
  name: push all data to qcd
  description: push all data to qcd
  fields:
    secret_key:
      name: Secret key
      description:  Secret key
      required: true
      selector:
        text:
    date:
      name: Date
      description: Date to specify which log file to change
      required: false
      selector:
        date:

update_period:
  name: Update period
  description: Update period
  fields:
    person_id:
      name: Person ID
      description: Person ID
      required: true
      selector:
        text: {}
    start_time:
      name: Start time
      description: Start time (optional)
      required: false
      selector:
        text: {}
    end_time:
      name: End time
      description: End time (optional)
      required: false
      selector:
        text: {}

sync_periods:
  name: Sync Periods
  description: Sync periods with the server

set_hrm_sync_interval:
  name: Set HRM Sync Interval
  description: Change loop interval (seconds) for auto-syncing HRM queue API.
  fields:
    interval:
      name: Interval (s)
      description: Polling interval in seconds (minimum 5s)
      required: true
      selector:
        number:
          min: 5
          max: 86400
          mode: box
